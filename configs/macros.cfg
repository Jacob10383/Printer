
[respond]


[gcode_macro STATUS_MSG]
gcode:
  {% set MESSAGE = params.MSG|default('')|string %}
  {% set TYPE = params.TYPE|default('echo')|string %}
  {% set PREFIX = params.PREFIX|default('')|string %}
  {% set DISPLAY = params.DISPLAY|default('yes')|lower in ['yes', 'true', '1'] %}
  {% if DISPLAY %}
    M117 {MESSAGE}
  {% endif %}
  {% if TYPE == "error" %}
    RESPOND TYPE=error MSG="{MESSAGE}"
  {% else %}
    RESPOND PREFIX="{PREFIX}" MSG="{MESSAGE}"
  {% endif %}


[gcode_macro HOME_IF_NEEDED]
description: Homes axes when needed. Usage: HOME_IF_NEEDED [AXIS=<x|y|z|xy|xyz|etc>]
gcode:
  {% set homed = printer.toolhead.homed_axes %}
  {% set axis = params.AXIS|default("xyz")|lower %}

  {% set needs_x = "x" in axis and "x" not in homed %}
  {% set needs_y = "y" in axis and "y" not in homed %}
  {% set needs_z = "z" in axis and "z" not in homed %}

  {% if needs_z %}
    G28 Z
  {% elif needs_x or needs_y %}
    # Home Y first to avoid homing X while inside the back corridor
    G28 X Y
  {% endif %}

[gcode_macro _ENSURE_TEMP]
gcode:
    {% if params.SENSOR in printer %}
        {% set temp = printer[params.SENSOR].temperature %}
        {% set target = printer[params.SENSOR].target %}
        {% set MIN = params.MIN|float %}
        {% set MAX = params.MAX|float %}
        {% set in_range = temp >= MIN and temp <= MAX %}

        {% if not in_range %}
            STATUS_MSG MSG="Wait finished, but temp is OUT OF RANGE! Current: {temp|round(1)}°C" TYPE=error DISPLAY=no
            {% if 'extruder' in params.SENSOR %}
                STATUS_MSG MSG="Using M109 to set {params.SENSOR} to {target}°C" DISPLAY=no
                M109 S{target}
            {% elif params.SENSOR == 'heater_bed' %}
                STATUS_MSG MSG="Using M190 to set heater_bed to {target}°C" DISPLAY=no
                M190 S{target}
            {% endif %}
        {% endif %}
    {% else %}
        STATUS_MSG MSG="Error: Sensor '{params.SENSOR}' not found." TYPE=error DISPLAY=no
    {% endif %}

[gcode_macro TEMPERATURE_WAIT]
rename_existing: TEMPERATURE_WAIT_BASE
gcode:
    {% set SENSOR = params.SENSOR|default('extruder') %}
    {% set CLEAN = params.CLEAN|default('no')|lower in ['yes', 'true', '1'] %}
    {% set has_min = 'MINIMUM' in params %}
    {% set has_max = 'MAXIMUM' in params %}
    {% set MIN = params.MINIMUM|float if has_min else -999 %}
    {% set MAX = params.MAXIMUM|float if has_max else 999 %}
    {% set is_heater = ('extruder' in SENSOR) or (SENSOR == 'heater_bed') %}
    {% set target = printer[SENSOR].target|float if is_heater else 0 %}

    # Skip if target makes condition impossible
    {% set should_skip = is_heater and (target < MIN or target > MAX) %}

    {% if should_skip %}
        STATUS_MSG MSG="TEMPERATURE_WAIT skipped: {% if has_min and has_max %}{MIN}°C - {MAX}°C{% elif has_min %}≥{MIN}°C{% else %}≤{MAX}°C{% endif %}; {SENSOR} target is {target|round(1)}°C" DISPLAY=no
    {% else %}
        STATUS_MSG MSG="Waiting for {SENSOR} to reach {% if has_min and has_max %}{MIN}°C - {MAX}°C{% elif has_min %}≥{MIN}°C{% elif has_max %}≤{MAX}°C{% else %}any{% endif %}" DISPLAY=no
        TEMPERATURE_WAIT_BASE {rawparams}
        {% if is_heater %}
            _ENSURE_TEMP SENSOR={SENSOR} MIN={MIN} MAX={MAX}
        {% endif %}
        {% if 'extruder' in SENSOR and MIN >= 200 and CLEAN %}
            HOME_IF_NEEDED
            BOX_NOZZLE_CLEAN
        {% endif %}
    {% endif %}

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_ORIG
gcode:
    SET_VELOCITY_LIMIT VELOCITY=800 SQUARE_CORNER_VELOCITY=5 ACCEL=8000 ACCEL_TO_DECEL=5000
    BED_MESH_CALIBRATE_ORIG {rawparams}

[gcode_macro _PAUSE_CONTEXT]
description: Saved pause state for RESUME: print Z, original nozzle target, and raw fan outputs.
variable_z: 0.0
variable_nozzle_temp: 0
variable_fan0: 0.0
variable_fan2: 0.0
variable_extruder_fan: 0.0
gcode:

[gcode_macro _PAUSE_Z_MOVE]
description: Move Z +25mm and clamps so the final Z never exceeds 350.
gcode:
  {% set current_z = printer.toolhead.position.z|float %}
  {% set lift = params.LIFT|default(25.0)|float %}
  {% if current_z + lift > 350.0 %}
    {% set lift = 350.0 - current_z %}
  {% endif %}
  {% if lift < 0 %}
    {% set lift = 0 %}
  {% endif %}
  {% if lift > 0 %}
    SAVE_GCODE_STATE NAME=PAUSE_Z_MOVE_STATE
    G91
    G1 Z{lift} F1000
    RESTORE_GCODE_STATE NAME=PAUSE_Z_MOVE_STATE
  {% endif %}

[gcode_macro _END_PRINT_Z_MOVE]
description: Start from current Z + 50, floor that at 100, cap it at 350, and only move upward.
gcode:
  {% set current_z = printer.toolhead.position.z|float %}
  {% set target_z = current_z + 50.0 %}
  {% if target_z < 100.0 %}
    {% set target_z = 100.0 %}
  {% endif %}
  {% if target_z > 350.0 %}
    {% set target_z = 350.0 %}
  {% endif %}
  {% if target_z > current_z %}
    SAVE_GCODE_STATE NAME=END_PRINT_Z_MOVE_STATE
    G90
    G1 Z{target_z} F1800
    RESTORE_GCODE_STATE NAME=END_PRINT_Z_MOVE_STATE
  {% endif %}


[gcode_macro PAUSE]
description: Save resume state, call PAUSE_BASE, drop nozzle target to 140C, retract 3mm, lift/wipe/park, then shut off fan0/fan2/extruder_fan.
rename_existing: PAUSE_BASE
gcode:
  {% if printer.pause_resume.is_paused|lower == 'false' %}
    SET_GCODE_VARIABLE MACRO=_PAUSE_CONTEXT VARIABLE=z VALUE={printer.toolhead.position.z|float}
    SET_GCODE_VARIABLE MACRO=_PAUSE_CONTEXT VARIABLE=nozzle_temp VALUE={printer.extruder.target|int}
    SET_GCODE_VARIABLE MACRO=_PAUSE_CONTEXT VARIABLE=fan0 VALUE={printer['output_pin fan0'].value|float}
    SET_GCODE_VARIABLE MACRO=_PAUSE_CONTEXT VARIABLE=fan2 VALUE={printer['output_pin fan2'].value|float}
    SET_GCODE_VARIABLE MACRO=_PAUSE_CONTEXT VARIABLE=extruder_fan VALUE={printer['output_pin extruder_fan'].value|float}
    PAUSE_BASE
    M400
    SAVE_GCODE_STATE NAME=PAUSE_RETRACT_STATE
    M83
    G1 E-3.0 F1800
    RESTORE_GCODE_STATE NAME=PAUSE_RETRACT_STATE
    M104 S140
    _PAUSE_Z_MOVE
    BOX_NOZZLE_CLEAN
    BOX_GO_TO_EXTRUDE_POS
    SET_PIN PIN=fan0 VALUE=0
    SET_PIN PIN=fan2 VALUE=0
    SET_PIN PIN=extruder_fan VALUE=0
  {% endif %}

[gcode_macro RESUME]
description: Reheat to saved target or 240C fallback, move to paused Z + 5, prime 30mm, run _FLUSH_CLEAN_SNAP REPUSH=1, restore fans, then call RESUME_BASE.
rename_existing: RESUME_BASE
gcode:
  {% if printer.pause_resume.is_paused|lower == 'true' %}
    {% set resume_temp = printer["gcode_macro _PAUSE_CONTEXT"].nozzle_temp|int %}
    {% if resume_temp < 170 %}
      {% set resume_temp = 240 %}
    {% endif %}
    M104 S{resume_temp}
    {% set paused_z = printer["gcode_macro _PAUSE_CONTEXT"].z|float %}
    {% set resume_z = paused_z + 5.0 %}
    {% if resume_z > 350.0 %}
      {% set resume_z = 350.0 %}
    {% endif %}
    {% if resume_z < 0.0 %}
      {% set resume_z = 0.0 %}
    {% endif %}
    {% if printer.toolhead.position.z|float != resume_z %}
      SAVE_GCODE_STATE NAME=RESUME_Z_RETURN_STATE
      G90
      G1 Z{resume_z} F1000
      RESTORE_GCODE_STATE NAME=RESUME_Z_RETURN_STATE
    {% endif %}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={resume_temp - 3} MAXIMUM={resume_temp + 3}
    SAVE_GCODE_STATE NAME=RESUME_PRIME_STATE
    M83
    G1 E30.0 F300
    RESTORE_GCODE_STATE NAME=RESUME_PRIME_STATE
    M400
    _FLUSH_CLEAN_SNAP REtract=0
    {% set fan0 = printer["gcode_macro _PAUSE_CONTEXT"].fan0|float %}
    {% set fan2 = printer["gcode_macro _PAUSE_CONTEXT"].fan2|float %}
    {% set extruder_fan = printer["gcode_macro _PAUSE_CONTEXT"].extruder_fan|float %}
    SET_PIN PIN=fan0 VALUE={(fan0 * 255.0 + 0.5)|int}
    SET_PIN PIN=fan2 VALUE={(fan2 * 255.0 + 0.5)|int}
    SET_PIN PIN=extruder_fan VALUE={1 if extruder_fan > 0 else 0}
    RESUME_BASE {rawparams}
  {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: CANCEL_PRINT_BASE
gcode:
  CANCEL_PRINT_BASE
  END_PRINT

[gcode_macro END_PRINT]
description: Turn heaters and controllable fans off, move Z with _END_PRINT_Z_MOVE, then park at the extrude position.
gcode:
  M400
  TURN_OFF_HEATERS
  SET_PIN PIN=fan0 VALUE=0
  SET_PIN PIN=fan1 VALUE=0
  SET_PIN PIN=fan2 VALUE=0
  SET_PIN PIN=extruder_fan VALUE=0
  _END_PRINT_Z_MOVE
  BOX_GO_TO_EXTRUDE_POS


[gcode_macro LUBRICATE_RAILS]
gcode:
    {% set ITERATIONS = params.ITERATIONS|default(1)|int %}
    {% set SPEED_MM_S = params.SPEED|default(500)|float %}
    {% set SPEED_MM_MIN = SPEED_MM_S * 60 %}

    HOME_IF_NEEDED
    G1 Z10 F3000

    {% for i in range(ITERATIONS) %}
        STATUS_MSG MSG="Lubricating rails, iteration {i + 1} of {ITERATIONS}..."
        G1 X0 Y0 Z10 F{SPEED_MM_MIN}
        G1 X350 Y350 Z10 F{SPEED_MM_MIN}
        G1 X0 Y350 Z10 F{SPEED_MM_MIN}
        G1 X350 Y0 Z10 F{SPEED_MM_MIN}
        G1 X0 Y0 Z350 F3000
        G1 X350 Y350 Z10 F3000
        G1 X350 Y0 Z10 F{SPEED_MM_MIN}
        G1 X0 Y0 Z10 F{SPEED_MM_MIN}
        G1 X0 Y350 Z10 F{SPEED_MM_MIN}
        G1 X350 Y350 Z10 F{SPEED_MM_MIN}
    {% endfor %}

[gcode_macro RESONANCE_TORTURE]
description: Generate vibration patterns for quick resonance testing
gcode:
    {% set pattern = params.PATTERN|default("CORNER")|upper %}
    {% set moves = params.MOVES|default(50)|int %}
    {% set x_center = params.X|default(175)|float %}
    {% set y_center = params.Y|default(175)|float %}
    {% set amplitude = params.AMP|default(10)|float %}
    {% set speed_mms = params.SPEED|default(50)|float %}
    {% set speed_mmm = speed_mms * 60 %}

    SAVE_GCODE_STATE NAME=RESONANCE_STATE
    G90
    G1 X{x_center} Y{y_center} F{speed_mmm}

    {% if pattern == "CORNER" %}
        {% for i in range(moves) %}
            {% if i % 2 == 0 %}
                G1 X{x_center + amplitude} Y{y_center + amplitude} F{speed_mmm}
            {% else %}
                G1 X{x_center - amplitude} Y{y_center - amplitude} F{speed_mmm}
            {% endif %}
        {% endfor %}
    {% elif pattern == "CROSS" %}
        {% for i in range(moves) %}
            {% set phase = i % 4 %}
            {% if phase == 0 %}
                G1 X{x_center + amplitude} Y{y_center} F{speed_mmm}
            {% elif phase == 1 %}
                G1 X{x_center} Y{y_center + amplitude} F{speed_mmm}
            {% elif phase == 2 %}
                G1 X{x_center - amplitude} Y{y_center} F{speed_mmm}
            {% else %}
                G1 X{x_center} Y{y_center - amplitude} F{speed_mmm}
            {% endif %}
        {% endfor %}
    {% elif pattern == "SQUARE" %}
        {% for i in range(moves // 4) %}
            G1 X{x_center + amplitude} Y{y_center + amplitude} F{speed_mmm}
            G1 X{x_center - amplitude} Y{y_center + amplitude} F{speed_mmm}
            G1 X{x_center - amplitude} Y{y_center - amplitude} F{speed_mmm}
            G1 X{x_center + amplitude} Y{y_center - amplitude} F{speed_mmm}
        {% endfor %}
    {% elif pattern == "ZIGZAG" %}
        {% for i in range(moves) %}
            {% if i % 2 == 0 %}
                G1 X{x_center + amplitude} Y{y_center + ((i % 4 - 2) * amplitude / 2)} F{speed_mmm}
            {% else %}
                G1 X{x_center - amplitude} Y{y_center + ((i % 4 - 2) * amplitude / 2)} F{speed_mmm}
            {% endif %}
        {% endfor %}
    {% elif pattern == "CHAOS" %}
        {% for i in range(moves) %}
            {% set x_mult = ((i * 7 + 3) % 13 - 6) / 6.0 %}
            {% set y_mult = ((i * 11 + 5) % 17 - 8) / 8.0 %}
            G1 X{x_center + amplitude * x_mult} Y{y_center + amplitude * y_mult} F{speed_mmm}
        {% endfor %}
    {% else %}
        STATUS_MSG MSG="Unknown pattern: {pattern}. Available: CORNER, CROSS, SQUARE, ZIGZAG, CHAOS" TYPE=error DISPLAY=no
    {% endif %}

    G1 X{x_center} Y{y_center} F{speed_mmm}
    RESTORE_GCODE_STATE NAME=RESONANCE_STATE

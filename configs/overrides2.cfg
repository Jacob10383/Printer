[gcode_macro _START_PRINT_VARS]
variable_heat_soak: 0                # minutes
variable_offset_PETG: 0.065
variable_offset_ABS: 0
variable_offset_ASA: 0
variable_offset_PLA: 0.075
variable_offset_DEFAULT: 0.00

[gcode_macro SET_ACTIVE_SPOOL]
gcode:
    {% if params.ID %}
        {% set id = params.ID|int %}
        {action_call_remote_method(
            "spoolman_set_active_spool",
            spool_id=id
        )}
    {% else %}
        {action_respond_info("Parameter 'ID' is required")}
    {% endif %}

[gcode_macro CLEAR_ACTIVE_SPOOL]
gcode:
    {action_call_remote_method(
        "spoolman_set_active_spool",
        spool_id=None
    )}

[z_align]
distance_ratio: 0.85  # Distance ratio coefficient for rapid upward movement
quick_speed: 30 # mm/s  Descent speed (increased for speed)
slow_speed: 10 # mm/s  Probing speed (increased for speed)
rising_dist: 10 # mm  Rising distance after first photoelectric detection (reduced)
safe_dist: 40 # mm  Heated bed tilt deviation safety value - distance one side endstop can descend after the other triggers
filter_cnt: 10 # Consecutive endstop trigger count for filtering (reduced for speed)
timeout: 30 # s Single probe timeout duration (reduced)
retries: 5 # Number of retries (reduced since probe will fix errors anyway)
retry_tolerance: 10  # Maximum allowable deviation for dual photoelectric adjustment (relaxed to ~0.05mm since probe will correct)
endstop_pin_z: PA15, PA8  # Photoelectric trigger pins, multiple endstop configuration: endstop_pin_z: PA15, PA8... supports up to 4 endstops
zd_up: 0  # Stepper motor logic level when moving away from endstop switch
zes_untrig: 1  # Endstop switch logic level when not triggered
zmax_safe_pox_diff: 10 # zmax_safe_pox = position_max from stepper_z section minus zmax_safe_pox_diff


[input_shaper]
shaper_type_x = 2hump_ei
shaper_freq_x = 71.0
shaper_type_y = mzv
shaper_freq_y = 42.4

[heater_bed]
sensor_type: Generic 3950
pid_kp = 45.512
pid_ki = 1.331
pid_kd = 389.129

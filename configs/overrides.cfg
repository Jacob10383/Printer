#═══════════════════════════════════════════════════════════════════════════════
#  CARTOGRAPHER & BED MESH
#═══════════════════════════════════════════════════════════════════════════════
[cartographer scan_model default]
coefficients: 1.5333923950772392,2.0298217040002475,0.8549082506732365,0.4480396977224829,0.3780432700142818,0.16995634116788605,-0.19516564598815195,-0.010066147144897468,0.22651989222618668,0.06733726379215624
domain: 3.3372278248926855e-07,3.4375045474916517e-07
z_offset: 0
reference_temperature: 37.85
software_version: 1.5.0-k2jacob10383-custom
mcu_version: CARTOGRAPHER V4 6.0.0

[cartographer touch_model default]
threshold: 1600
speed: 2.0
z_offset: -0.02
thermal_expansion_coefficient: 0.0004
software_version: 1.5.0-k2jacob10383-custom
mcu_version: CARTOGRAPHER V4 6.0.0

[cartographer touch]
samples: 4
max_samples: 12
max_noisy_samples: 3   # window = 7
sample_range: 0.010
EXPERIMENTAL_home_random_radius: 2

[cartographer]
y_offset: -14

[bed_mesh]
probe_count: 75, 75
mesh_min: 10, 10
mesh_max: 345, 335
adaptive_margin: 10
move_check_distance: 1
speed: 300

#═══════════════════════════════════════════════════════════════════════════════
#  MOTION
#═══════════════════════════════════════════════════════════════════════════════
[input_shaper]
# X-axis: smooth_zv @ 54.8 Hz (vibration: 0.00%, max_accel: 10800 mm/sec²)
shaper_type_x: smooth_zv
smoother_freq_x: 49.0
# Y-axis: smooth_zv @ 49.0 Hz (vibration: 0.77%, max_accel: 8600 mm/sec²)
shaper_type_y: smooth_zv
smoother_freq_y: 49.0

[z_align]
rising_dist: 5
rise_distance: 345
rise_speed: 50

[stepper_x]
homing_speed: 150
second_homing_speed: 50

[stepper_y]
homing_speed: 150
second_homing_speed: 50

#═══════════════════════════════════════════════════════════════════════════════
# PID
#═══════════════════════════════════════════════════════════════════════════════
[extruder]
control: pid
pid_kp: 25
pid_ki: 2.5
pid_kd: 62

[heater_bed]
control: pid
pid_Kp: 70
pid_Ki: 0.55
pid_Kd: 1800

#═══════════════════════════════════════════════════════════════════════════════
#  rando
#═══════════════════════════════════════════════════════════════════════════════
[toolchanger]
flush_speed: 20              # mm³/s volumetric flow rate
pre_flush_speed: 15          # mm³/s for pre-flush extrusion
pre_flush_length: 63         # mm to extrude before flush
default_temp: 220            # fallback temp when no gcode data
retract_length: 45           # mm to retract before cutting
spoolman_integration: true  # enable spoolman spool tracking

[gcode_macro _START_PRINT_VARS]
variable_heat_soak: 0
variable_offset_ASA: 0
variable_offset_DEFAULT: 0.00
gcode:

[virtual_sdcard]
forced_leveling: false

[box]
cut_pos_x: -6.30
